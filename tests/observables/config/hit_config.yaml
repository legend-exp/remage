objects:
  geometry: pyg4ometry.gdml.Reader(ARGS.gdml).getRegistry()

processing_groups:
  - name: geds

    detector_mapping:
      - output: germanium

    detector_objects:
      phyvol: OBJECTS.geometry.physicalVolumeDict['germanium']

    outputs:
      - t0
      - evtid
      - truth_energy
      - active_energy_pre
      - active_energy_post
      - active_energy_avg
      - smeared_energy_pre
      - smeared_energy_post
      - smaeared_energy_avg
      - r90_pre
      - r90_post
      - r90_avg
      - max_z_avg
      - max_z_post
      - max_z_pre

    operations:
      truth_energy: ak.sum(HITS.edep, axis=-1)

      activeness_pre:
        reboost.math.functions.piecewise_linear_activeness(HITS.dist_to_surf_pre,
        fccd_in_mm=1, dlf=0.5)
      activeness_post:
        reboost.math.functions.piecewise_linear_activeness(HITS.dist_to_surf_post,
        fccd_in_mm=1, dlf=0.5)
      activeness_avg:
        reboost.math.functions.piecewise_linear_activeness(HITS.dist_to_surf,
        fccd_in_mm=1, dlf=0.5)

      active_energy_pre: ak.sum(HITS.edep*HITS.activeness_pre, axis=-1)
      active_energy_post: ak.sum(HITS.edep*HITS.activeness_post, axis=-1)
      active_energy_avg: ak.sum(HITS.edep*HITS.activeness_avg, axis=-1)

      r90_avg: reboost.hpge.psd.r90(HITS.edep, HITS.xloc,HITS.yloc,HITS.zloc)
      r90_post: reboost.hpge.psd.r90(HITS.edep, HITS.xloc_post,HITS.yloc_post,HITS.zloc_post)
      r90_pre: reboost.hpge.psd.r90(HITS.edep, HITS.xloc_pre,HITS.yloc_pre,HITS.zloc_pre)

      max_z_pre:
        expression: ak.fill_none(1000*ak.max(HITS.zloc_pre,axis=-1),np.nan) + 20
        units: mm
      max_z_post:
        expression: ak.fill_none(1000*ak.max(HITS.zloc_post,axis=-1),np.nan) + 20
        units: mm
      max_z_avg:
        expression: ak.fill_none(1000*ak.max(HITS.zloc,axis=-1),np.nan) + 20
        units: mm

  - name: vtx

    lh5_group: null

    detector_mapping:
      - output: vtx

    outputs:
      - xloc
      - yloc
      - zloc
      - rloc
      - evtid

    operations:
      rloc: np.sqrt(HITS.xloc**2+HITS.yloc**2)
